# docker-compose.yml (at workspace root)
version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: dan-and-bradstreet-postgres
    command: ["postgres", "-c", "wal_level=logical"]   # enable logical replication for Debezium
    ports:
      - "5432:5432"   # host:container — access from host at localhost:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persist DB files across restarts

volumes:
  postgres_data: